<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Editar Perfil | VitaLoop</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-header bg-success text-white text-center py-4">

                    <h2 class="mb-0">

                        Editar Perfil

                    </h2>

                    <p class="mb-0">

                        Actualiza tu información personal

                    </p>

                </div>

                <div class="card-body p-5">

                    <form method="POST">

                        <div class="row">

                            <div class="col-md-6 mb-4">

                                <label class="form-label">

                                    Nombre

                                </label>

                                <input
                                    type="text"
                                    name="nombre"
                                    class="form-control"
                                    value="{{ usuario[0] }}"
                                    required>

                            </div>

                            <div class="col-md-6 mb-4">

                                <label class="form-label">

                                    Apellido

                                </label>

                                <input
                                    type="text"
                                    name="apellido"
                                    class="form-control"
                                    value="{{ usuario[1] }}">

                            </div>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Correo electrónico

                            </label>

                            <input
                                type="email"
                                name="correo"
                                class="form-control"
                                value="{{ usuario[2] }}"
                                required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Usuario

                            </label>

                            <input
                                type="text"
                                name="usuario"
                                class="form-control"
                                value="{{ usuario[3] }}"
                                required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Teléfono

                            </label>

                            <input
                                type="text"
                                name="telefono"
                                class="form-control"
                                value="{{ usuario[4] if usuario[4] else '' }}">

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-4">

                                <label class="form-label">

                                    Provincia

                                </label>

                                <input
                                    type="text"
                                    name="provincia"
                                    class="form-control"
                                    value="{{ usuario[5] if usuario[5] else '' }}">

                            </div>

                            <div class="col-md-6 mb-4">

                                <label class="form-label">

                                    Municipio

                                </label>

                                <input
                                    type="text"
                                    name="municipio"
                                    class="form-control"
                                    value="{{ usuario[6] if usuario[6] else '' }}">

                            </div>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Biografía

                            </label>

                            <textarea
                                name="biografia"
                                rows="5"
                                class="form-control">{{ usuario[7] if usuario[7] else '' }}</textarea>

                        </div>

                        <div class="d-flex justify-content-between">

                            <a href="{{ url_for('perfil') }}"
                               class="btn btn-outline-secondary">

                                Cancelar

                            </a>

                            <button
                                type="submit"
                                class="btn btn-success">

                                Guardar cambios

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
