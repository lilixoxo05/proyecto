<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaLoop - Publicar Donación</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/estilos.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">

        <a class="navbar-brand" href="{{ url_for('inicio') }}">
            VitaLoop
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       href="{{ url_for('inicio') }}">
                        Inicio
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active"
                       href="{{ url_for('publicar') }}">
                        Publicar
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="{{ url_for('login') }}">
                        Cerrar sesión
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- FORMULARIO -->
<div class="container mt-5 mb-5">

    <div class="row justify-content-center">
        <div class="col-md-7">

            <div class="card shadow p-4">

                <h3 class="text-center text-primary mb-4">
                    Publicar Donación
                </h3>

                <form method="POST"
                      enctype="multipart/form-data">

                    <!-- Título -->
                    <div class="mb-3">
                        <label class="form-label">
                            Título de la donación
                        </label>

                        <input type="text"
                               class="form-control"
                               name="titulo"
                               placeholder="Ej: Ropa en buen estado"
                               required>
                    </div>

                    <!-- Descripción -->
                    <div class="mb-3">
                        <label class="form-label">
                            Descripción
                        </label>

                        <textarea class="form-control"
                                  name="descripcion"
                                  rows="4"
                                  placeholder="Describe la donación..."
                                  required></textarea>
                    </div>

                    <!-- Categoría -->
                    <div class="mb-3">
                        <label class="form-label">
                            Categoría
                        </label>

                        <select class="form-select"
                                name="categoria"
                                required>

                            <option value="">Seleccione una categoría</option>
                            <option value="Ropa">Ropa</option>
                            <option value="Comida">Comida</option>
                            <option value="Libros">Libros</option>
                            <option value="Juguetes">Juguetes</option>
                            <option value="Electrónicos">Electrónicos</option>
                            <option value="Otros">Otros</option>

                        </select>
                    </div>

                    <!-- Ubicación -->
                    <div class="mb-3">
                        <label class="form-label">
                            Ubicación
                        </label>

                        <input type="text"
                               class="form-control"
                               name="ubicacion"
                               placeholder="Ej: San Pedro de Macorís"
                               required>
                    </div>

                    <!-- Imagen -->
                    <div class="mb-4">
                        <label class="form-label">
                            Imagen de la donación (Opcional)
                        </label>

                        <input type="file"
                               class="form-control"
                               name="imagen"
                               accept="image/*">
                    </div>

                    <!-- Botón -->
                    <button type="submit"
                            class="btn btn-success w-100">
                        Publicar Donación
                    </button>

                </form>

            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
