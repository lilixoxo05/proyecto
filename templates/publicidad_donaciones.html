<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaLoop - Publicar Donación</title>

    <link rel="stylesheet" href="static/css/estilos.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="inicio.html">VitaLoop</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="inicio.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link active" href="#">Publicar</a></li>
                <li class="nav-item"><a class="nav-link" href="login.html">Cerrar sesión</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- FORMULARIO -->
<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-7">

            <div class="card shadow p-4">
                <h3 class="text-center text-primary mb-3">Publicar Donación</h3>

                <form>

                    <div class="mb-3">
                        <label class="form-label">Título de la donación</label>
                        <input type="text" class="form-control" placeholder="Ej: Ropa en buen estado">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" rows="4" placeholder="Describe la donación..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <select class="form-select">
                            <option>Ropa</option>
                            <option>Comida</option>
                            <option>Libros</option>
                            <option>Otros</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ubicación</label>
                        <input type="text" class="form-control" placeholder="Ej: Constanza">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Imagen (opcional)</label>
                        <input type="file" class="form-control">
                    </div>

                    <button type="button" class="btn btn-success w-100">
                        Publicar Donación
                    </button>

                </form>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
