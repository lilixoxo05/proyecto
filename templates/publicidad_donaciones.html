<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaLoop - Publicar Donación</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-vitaloop">
    <div class="d-flex align-items-center w-100">

    <!-- Logo -->
    <a class="navbar-brand d-flex align-items-center me-auto"
       href="{{ url_for('inicio') }}">
        <img src="{{ url_for('static', filename='img/logo.jpeg') }}"
        alt="Logo VitaLoop"
            class="logo-nav">

        <span class="ms-2 nombre-logo">VitaLoop</span>
    </a>

    <!-- Publicar -->
    <a href="{{ url_for('publicar') }}" class="nav-publicar me-4">
        Publicar Donación
    </a>

    <!-- Perfil -->
    <div class="perfil me-3">
        A
    </div>

    <!-- Menú -->
    <div class="dropdown">
        <button class="btn-menu" type="button" data-bs-toggle="dropdown">
            <i class="bi bi-three-dots-vertical"></i>
        </button>

        <ul class="dropdown-menu dropdown-menu-end shadow">
            <li>
                <a class="dropdown-item" href="{{ url_for('inicio') }}">
                    <i class="bi bi-house me-2"></i>Inicio
                </a>
            </li>

            <li>
                <a class="dropdown-item" href="#nosotros">
                    <i class="bi bi-people me-2"></i>Nosotros
                </a>
            </li>

            <li><hr class="dropdown-divider"></li>

            <li>
                <a class="dropdown-item text-danger" href="{{ url_for('login') }}">
                    <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
                </a>
            </li>
        </ul>
    </div>

</div>
</nav>

<!-- FORMULARIO -->
<div class="container mt-5 mb-5">

    <div class="row justify-content-center">
        <div class="col-md-7">

            <div class="card shadow p-4">

                <h3 class="text-center text-primary mb-4">
                    Publicar Donación
                </h3>

                <form method="POST"
                      enctype="multipart/form-data">

                    <!-- Título -->
                    <div class="mb-3">
                        <label class="form-label">
                            Título de la donación
                        </label>

                        <input type="text"
                               class="form-control"
                               name="titulo"
                               placeholder="Ej: Ropa en buen estado"
                               required>
                    </div>

                    <!-- Descripción -->
                    <div class="mb-3">
                        <label class="form-label">
                            Descripción
                        </label>

                        <textarea class="form-control"
                                  name="descripcion"
                                  rows="4"
                                  placeholder="Describe la donación..."
                                  required></textarea>
                    </div>

                    <!-- Tipo de donación -->
                    <div class="mb-3">
                        <label class="form-label">
                            Tipo de donación
                        </label>

                        <select class="form-select"
                                name="tipo"
                                required>

                            <option value="">Selecciona el tipo de donacion </option>
                            <option value="Ropa">Ropa</option>
                            <option value="Comida">Comida</option>
                            <option value="Libros">Libros</option>
                            <option value="Juguetes">Juguetes</option>
                            <option value="Electrónicos">Electrónicos</option>
                            <option value="Otros">Otros</option>

                        </select>
                    </div>

                    <!-- Ubicación -->
                    <div class="mb-3">
                        <label class="form-label">
                            Ubicación
                        </label>

                        <input type="text"
                               class="form-control"
                               name="ubicacion"
                               placeholder="Ej: San Pedro de Macorís"
                               required>
                    </div>

                    <!-- Imagen -->
                    <div class="mb-4">
                        <label class="form-label">
                            Imagen de la donación (Opcional)
                        </label>

                        <input type="file"
                               class="form-control"
                               name="imagen"
                               accept="image/*">
                    </div>

                    <!-- Botón -->
                    <button type="submit"
                            class="btn btn-success w-100">
                        Publicar Donación
                    </button>

                </form>

            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
